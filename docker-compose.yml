services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: habit_tracker
      MYSQL_USER: habit_tracker
      MYSQL_PASSWORD: habit_tracker
    ports:
      - "3306:3306"
    volumes:
      - habit_tracker_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  habit_tracker_mysql_data:
