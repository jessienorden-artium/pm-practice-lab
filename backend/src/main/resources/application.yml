server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: habit-tracker-backend
  datasource:
    url: jdbc:mysql://localhost:3306/habit_tracker
    username: habit_tracker
    password: habit_tracker
    hikari:
      connection-timeout: 3000
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
